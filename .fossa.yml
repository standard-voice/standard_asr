# FOSSA scans the dependency surface we DISTRIBUTE, not our dev toolchain.
#
# FOSSA's uv analyzer would otherwise ingest the entire uv.lock graph (every
# dependency-group + extra + transitive, ~85 packages), so a license scan ends
# up auditing ruff, pytest, mkdocs, etc. -- none of which we ship. Open-source
# license obligations attach to what is distributed, so the FOSSA workflow
# (.github/workflows/fossa_scan.yml) generates a prod-only requirements.txt via
# `uv export`: runtime dependencies + every optional extra, with the dev
# dependency-groups (test/lint/typing) excluded.
#
# Listing the setuptools analyzer under `only` makes FOSSA read just that
# generated file and, by omission, disables the uv analyzer that would re-read
# the whole lockfile. The requirements.txt is generated in CI and never
# committed -- pyproject.toml and uv.lock remain the single source of truth.
version: 3
targets:
  only:
    - type: setuptools
      path: .
