`2025.10.01, 5:31pm`



uv workspace 准备好了。



现在开始开发 entrypoint





第一步，是建立 entrypoint 的标准。



```toml

[project.entry-points."standard_asr.engines"]

# key 是 engine id，value 指向一个“可导入对象”

"faster-whisper" = "std_faster_whisper.entrypoint:EngineClass"

```



我希望把模型名直接暴露在这边，因为我意识到每个模型的配置项，capability，语言支持，预设可能都不一样，直接在这里暴露模型名而非引擎，会是个更好的选择。



之后我们要进行重构，在架构上以模型为先而非推理引擎为先。单个引擎就是单个包。一个引擎可以暴露很多模型。之后可以提供一个可以加载 arbitrary 模型的模型项，但无论如何，作者可以确定的模型要直接暴露出去。



因为存在多个引擎同时支持同一个模型 (可能用不同方式推理，或单纯不同实现) 的问题，这里暴露出去的 model name 必须包含引擎的名字。



所以...?

```toml

[project.entry-points."standard_asr.engines"]

"faster-whisper/whisper" = "std_faster_whisper.entrypoint:EngineClass"

```



或是 `large-v3@faster-whisper`



这个 key 什么东西都可以写吗？我们肯定得制定一种很好的分割符，一种很好的格式来表达 engine + model id。





---



要不这样写？



```toml

[project.entry-points."standard_asr.models"]

"faster-whisper/whisper" = "std_faster_whisper.entrypoint:EngineClass"

```





---



决定: 使用 `<engine_id>/<model_name>` 的格式作为 Name

- 不推荐 model_name 留空，但配套工具要支持 model_name 留空，但如果 model_name 留空，。



engine_id 和 model_name 可用字符要规定。



engine id:

- engine id 里面不能包含 `/`

- `engine_id` 强烈建议就等于插件发行包的 PyPI 名称的 PEP 503 规范化结果，说人话就是你的 python 包名。

- 



决定: entrypoint 定稿 A



```toml

[project.entry-points."standard_asr.models"]

"faster-whisper/whisper" = "std_faster_whisper.entrypoint:EngineClass"

```









