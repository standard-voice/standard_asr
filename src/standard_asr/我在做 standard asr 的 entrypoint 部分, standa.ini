我在做 standard asr 的 entrypoint 部分, standard asr 会作为一个标准规定，告诉其他 asr 包要怎么实现一个 standard asr compliant 的 asr 库，同时提供各种配套工具。只要 standard asr compliant 的包一装在 python 环境里，standard asr compliant 的应用程序就能侦测到，能够发现并调用。这就是我们现在在尝试做的 entrypoint 机制。

所以要怎么开发？我开发完 entrypoint 机制之后，要怎么在我们这个 astral uv 环境里面方便的进行测试，写 sample client code 和 sample asr package code，来测试和演示这部分的功能？

帮我把所有该做的都做完，彻底完成 standard asr entrypoint 机制的开发和测试工作，以标准库的标准要求代码质量，另外开发完整的 sample code 和文档。



