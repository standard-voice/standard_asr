[project]
name = "standard-asr"
version = "0.1.0"
description = "USB protocol for speech recognition libraries"
readme = "README.md"
requires-python = ">=3.10"
license = { file = "LICENSE" }
authors = [{ name = "Yi-Ting Chiu", email = "mytim710@gmail.com" }]
dependencies = ["numpy>=1.24, <3", "pydantic>=2.5, <3"]

[dependency-groups]
dev = [
    "pyright>=1.1.404",
    "pytest>=8.4.1",
    "ruff>=0.12.11",
]

[project.optional-dependencies]
audio = ["soundfile>=0.12", "scipy>=1.10"]
docs = ["mkdocs-material>=9.6.18"]

[build-system]
requires = ["uv-build"]
build-backend = "uv_build"

[tool.uv.build-backend]
module-root = "src"
module-name = "standard_asr"

[tool.uv.workspace]
members = ["cookbook/std_faster_whisper"]

[tool.pyright]
# 官方文档: https://github.com/microsoft/pyright/blob/main/docs/configuration.md
typeCheckingMode = "strict"
include = ["src/standard_asr"]
pythonVersion = "3.10"

# --- 报告级别的微调 (可选，但推荐) ---
# 以下是一些在 strict 模式下，根据项目情况可能需要调整的选项。
# 暂时我们可以保持默认，但了解它们很有用。

reportMissingModuleSource = "warning"
#   如果一个库没有类型信息 (也没有 @types stub)，是警告还是报错。
#   对于库开发，设为 "error" 可以强迫你为所有依赖找到类型存根或自己创建。

reportUnusedVariable = "error"
#   报告未使用的变量。Ruff 也会做这个，但由类型检查器来做更精确。

# reportPrivateUsage: bool | "warning" | "error" = "error"
#   当外部代码访问了标记为 _private 或 __private 的成员时报错。
#   这有助于强制执行良好的封装。

reportUnknownMemberType = "error"
#   当无法确定成员的类型时报错。这能消灭大量的隐式 `Any`。
