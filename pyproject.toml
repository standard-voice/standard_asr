[project]
name = "standard-asr"
version = "0.1.0"
description = "USB protocol for speech recognition libraries"
readme = "README.md"
requires-python = ">=3.10"
license = { file = "LICENSE" }
authors = [{ name = "Yi-Ting Chiu", email = "mytim710@gmail.com" }]
dependencies = [
    "numpy>=1.24, <3",
    "pydantic>=2.5, <3",
]

[dependency-groups]
dev = [
    "pyright>=1.1.404",
    "pytest>=8.4.1",
    "ruff>=0.12.11",
]

[project.optional-dependencies]
audio = ["soundfile>=0.12", "scipy>=1.10"]
docs = ["mkdocs-material>=9.6.18"]

[build-system]
requires = ["uv-build"]
build-backend = "uv_build"

[tool.uv.build-backend]
module-root = "src"
module-name = "standard_asr"

[tool.uv.workspace]
members = ["cookbook/std_faster_whisper"]

[tool.pyright]
typeCheckingMode = "strict"
include = ["src/standard_asr", "cookbook"]
pythonVersion = "3.10"
reportMissingModuleSource = "warning"
reportUnusedVariable = "error"
reportUnknownMemberType = "error"
