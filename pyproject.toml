[project]
name = "standard-asr"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
    "numpy>=2.2.6",
    "pydantic>=2.11.7",
]

[build-system]
requires = ["uv-build"]
build-backend = "uv_build"

[tool.uv.build-backend]
module-root = "src"
module-name = "standard_asr"

[tool.uv.workspace]
members = [
    "cookbook/std_faster_whisper",
]
