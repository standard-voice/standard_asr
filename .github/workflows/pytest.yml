name: Tests & Coverage

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'tests/**'
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'tests/**'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pytest:
    # DEP.2: dual numpy axis (1.26 vs latest-2.x) + warnings-as-errors. We pin
    # numpy explicitly per leg so a regression against either major line fails
    # CI. numpy<2 has no cp313 wheel, so the 1.26 leg is excluded on 3.13.
    name: Pytest py${{ matrix.python-version }} numpy ${{ matrix.numpy }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
        numpy: ["1.26", "latest-2"]
        exclude:
          # numpy 1.x has no cp313 wheel (DEP.1); skip the 1.26 leg there.
          - python-version: "3.13"
            numpy: "1.26"

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          version: "latest"
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Install dependencies (dev group + audio extras)
        run: uv sync --all-extras --group dev

      - name: Pin numpy 1.26 (numpy-1 leg)
        if: matrix.numpy == '1.26'
        run: uv pip install 'numpy==1.26.*'

      - name: Pin latest numpy 2.x (numpy-2 leg)
        if: matrix.numpy == 'latest-2'
        run: uv pip install --upgrade 'numpy>=2,<3'

      - name: Show numpy version
        run: uv run python -c "import numpy; print('numpy', numpy.__version__)"

      - name: Run tests with coverage (warnings-as-errors)
        env:
          PYTHONPATH: src
        # DEP.2 mandates warnings-as-errors. -W error promotes any unhandled
        # warning (e.g. numpy deprecations) to a test failure.
        run: |
          uv run pytest -W error

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-py${{ matrix.python-version }}-numpy-${{ matrix.numpy }}
          path: coverage.xml
