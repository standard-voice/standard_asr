name: Dependency Review

on: [pull_request]

permissions:
  contents: read
  pull-requests: write

jobs:
  dependency-review:
    name: License & vulnerability gate
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          vulnerability-check: true
          fail-on-severity: moderate
          license-check: true
          # Allowlist: every license present in our distributed dependency
          # surface (runtime + extras). Uses ClearlyDefined metadata — no
          # deep-scan, so no false positives from bundled components.
          allow-licenses: >-
            0BSD, Apache-2.0, BSD-2-Clause, BSD-3-Clause, BSL-1.0,
            CC0-1.0, CC-BY-4.0, ISC, MIT, MPL-2.0, PSF-2.0,
            Python-2.0, Unlicense, Zlib
          comment-summary-in-pr: always
