name: Lint & Typecheck

on:
  push:
    branches: [main]
    paths:
      - '**/*.py'
      - 'src/**'
      - 'tests/**'
  pull_request:
    branches: [main]
    paths:
      - '**/*.py'
      - 'src/**'
      - 'tests/**'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & Typecheck (Ruff + Pyright)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.10"
      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          version: "latest"
          enable-cache: true
          cache-dependency-glob: uv.lock
      - name: Install dependencies (dev)
        run: uv sync --all-extras --group dev
      - name: Ruff format check
        run: uv run ruff format --check
      - name: Ruff lint
        run: uv run ruff check
      - name: Pyright
        run: uv run pyright
