name: zizmor GitHub Actions audit

# Static security analysis of our own GitHub Actions workflows with zizmor
# (https://docs.zizmor.sh/). Runs on every push and pull request. The job
# fails on any high-severity finding (zizmor's default exit behavior), and
# additionally uploads SARIF to GitHub code scanning when available.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Least-privilege default; the job below opts up only to what SARIF upload needs.
permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  zizmor:
    name: Run zizmor
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      security-events: write # Required for github/codeql-action/upload-sarif.
      contents: read         # Needed to clone the repo (private repos).
      actions: read          # Needed by upload-sarif to read workflow run info (private repos).
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0

      - name: Run zizmor (SARIF)
        # GH_TOKEN lets zizmor run online audits (e.g. ref/SHA resolution).
        # zizmor exits non-zero on findings at/above its default threshold
        # (high), so this step fails the job on high-severity findings.
        run: uvx zizmor@latest --format=sarif .github/workflows/ > results.sarif
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload SARIF to GitHub code scanning
        # SARIF upload requires a public repo or GitHub Advanced Security. If
        # neither applies, the upload (not the audit) is allowed to fail soft;
        # the audit step above already gates the job on high-severity findings.
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: results.sarif
          category: zizmor
