name: Release

# Publish standard-asr to PyPI via OIDC Trusted Publishing.
#
# Production path: publish a GitHub Release whose tag is vX.Y.Z and matches
# project.version in pyproject.toml. The workflow refuses to publish unless that
# commit is on the default branch and already has a successful checks-complete
# CI result.
#
# Dry run: run this workflow manually from the default branch. Manual dispatch
# publishes only to TestPyPI; production PyPI is intentionally Release-driven.

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  UV_VERSION: "0.11.21"

jobs:
  build:
    name: Build and verify distributions
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      checks: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: false

      - name: Assert release tag matches project version
        if: github.event_name == 'release'
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME#v}"
          version="$(uv version --short)"
          echo "release tag:     ${GITHUB_REF_NAME} (version part: ${tag})"
          echo "project version: ${version}"
          if [ "${tag}" != "${version}" ]; then
            echo "::error::Release tag '${GITHUB_REF_NAME}' != pyproject version '${version}'. Bump 'version' in pyproject.toml and re-tag."
            exit 1
          fi

      - name: Assert manual dry run targets the default branch
        if: github.event_name == 'workflow_dispatch'
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          set -euo pipefail
          echo "workflow ref:   ${GITHUB_REF_NAME}"
          echo "default branch: ${DEFAULT_BRANCH}"
          if [ "${GITHUB_REF_NAME}" != "${DEFAULT_BRANCH}" ]; then
            echo "::error::Manual TestPyPI dry runs must be dispatched from '${DEFAULT_BRANCH}'."
            exit 1
          fi

      - name: Assert release commit is on the default branch and CI-green
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          echo "release candidate sha: ${GITHUB_SHA}"
          compare_status="$(gh api "repos/${GITHUB_REPOSITORY}/compare/${GITHUB_SHA}...${DEFAULT_BRANCH}" --jq '.status')"
          echo "compare ${GITHUB_SHA}...${DEFAULT_BRANCH}: ${compare_status}"
          if [ "${compare_status}" != "identical" ] && [ "${compare_status}" != "ahead" ]; then
            echo "::error::Release candidate ${GITHUB_SHA} is not reachable from '${DEFAULT_BRANCH}'. Release only from mainline history."
            exit 1
          fi

          checks_ok="$(gh api -X GET "repos/${GITHUB_REPOSITORY}/commits/${GITHUB_SHA}/check-runs" \
            -F check_name='checks-complete' \
            --jq '[.check_runs[] | select(.app.slug == "github-actions" and .name == "checks-complete") | .conclusion] | any(. == "success")')"
          echo "checks-complete success present: ${checks_ok}"
          if [ "${checks_ok}" != "true" ]; then
            echo "::error::No successful 'checks-complete' check run found for ${GITHUB_SHA}. Wait for CI to pass before releasing."
            exit 1
          fi

      - name: Build sdist and wheel (core package only)
        run: uv build --package standard-asr --no-sources --out-dir dist --clear

      - name: Assert the wheel ships only source files
        run: |
          set -euo pipefail
          contents="$(unzip -Z1 dist/*.whl)"
          echo "${contents}"
          stray="$(printf '%s\n' "${contents}" \
            | grep -E '^standard_asr/' \
            | grep -vE '(/|\.py|\.pyi|/py\.typed)$' || true)"
          if [ -n "${stray}" ]; then
            echo "::error::Wheel ships unexpected non-source files:"
            printf '%s\n' "${stray}"
            exit 1
          fi
          echo "Wheel is clean (source files only)."

      - name: Smoke test wheel and source distribution
        run: |
          set -euo pipefail
          version="$(uv version --short)"
          wheel="$(find dist -maxdepth 1 -name '*.whl' -print -quit)"
          sdist="$(find dist -maxdepth 1 -name '*.tar.gz' -print -quit)"

          uv run --isolated --no-project --with "${wheel}" python -c "import importlib.metadata as m; import standard_asr; assert m.version('standard-asr') == '${version}'; assert standard_asr.__all__"
          uv run --isolated --no-project --with "${wheel}" standard-asr --help
          uv run --isolated --no-project --with "${sdist}" python -c "import importlib.metadata as m; import standard_asr; assert m.version('standard-asr') == '${version}'; assert standard_asr.__all__"

      - name: Upload verified distributions
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: standard-asr-distributions
          path: dist/
          if-no-files-found: error
          retention-days: 14

  publish-testpypi:
    name: Publish to TestPyPI
    if: github.event_name == 'workflow_dispatch'
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: testpypi
      url: https://test.pypi.org/p/standard-asr
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Download verified distributions
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: standard-asr-distributions
          path: dist/

      - name: Publish to TestPyPI (Trusted Publishing + PEP 740 attestations)
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          packages-dir: dist
          repository-url: https://test.pypi.org/legacy/
          attestations: true
          print-hash: true
          # TestPyPI is a throwaway rehearsal index: allow re-running a dry run
          # for the same version instead of failing on an immutable-file 409.
          # Production PyPI below stays strict (no skip) so an accidental
          # re-publish fails loudly.
          skip-existing: true

  publish-pypi:
    name: Publish to PyPI
    if: github.event_name == 'release'
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: pypi
      url: https://pypi.org/p/standard-asr
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Download verified distributions
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: standard-asr-distributions
          path: dist/

      - name: Publish to PyPI (Trusted Publishing + PEP 740 attestations)
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          packages-dir: dist
          attestations: true
          print-hash: true
