# Dependabot version updates (dependency-policy channel 2). We use Dependabot,
# not Renovate, to keep the trust surface minimal and GitHub-native (ADR D2).
version: 2

updates:
  # ---- GitHub Actions: keep SHA pins fresh ----------------------------------
  # Dependabot bumps the pinned SHA and the trailing `# vX.Y.Z` comment together,
  # so we stay fully SHA-pinned (required by our zizmor unpinned-uses policy)
  # while still receiving action security/maintenance updates.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    commit-message:
      prefix: ci
    cooldown:
      default-days: 7 # ADR D6: let a release settle before we adopt it.
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - ci
    groups:
      github-actions:
        patterns:
          - "*"

  # ---- Python dependencies (managed by uv) ----------------------------------
  #
  # ADR D3 — the bot updates uv.lock and MUST NOT narrow the pyproject.toml
  # compatibility contract. We enforce that with `versioning-strategy:
  # lockfile-only` (set below): Dependabot rewrites uv.lock and never edits
  # [project]. uv-ecosystem support for the option landed in
  # dependabot/dependabot-core#12162 (completed 2026-02). Do NOT remove it — the
  # lower-bound-only convention (ADR D4) does NOT prevent floor edits on its own:
  # Dependabot's default strategy raises even in-range floors (observed in
  # practice — it rewrote the `uv-build` and `mkdocstrings` floors that already
  # permitted the new version), which silently narrows the contract for any
  # runtime dep it touches.
  #
  # Floors are human-owned and CI-verified instead: the `lower-bounds` lane in
  # ci.yml re-resolves at each declared floor (`--resolution lowest-direct`), so a
  # floor moves only when a maintainer raises it deliberately and CI re-proves it.
  #
  # The sanctioned exception is Dependabot *security* updates (a separate channel,
  # enabled in repo settings): they still run. For an uncapped lower-bound dep the
  # fix lands via the lock and downstream resolves to the patched version
  # automatically; a capped dep (the uv-build build-backend cap, or the tool.uv
  # `starlette<1.0` constraint) is bumped deliberately by hand.
  #
  # NOTE on grouping: `groups.*.dependency-type` (development/production) is NOT
  # supported for the uv ecosystem (dependabot/dependabot-core#13202 — uv
  # classifies every dependency as "production"), so a dev-vs-runtime split would
  # silently match nothing. Astral's own guidance keeps the uv config minimal.
  # We therefore group by UPDATE TYPE, which works: low-risk minor/patch bumps
  # (runtime + tooling alike) batch into one PR, and every MAJOR bump is left
  # ungrouped so it lands in its own PR for deliberate, isolated review.
  - package-ecosystem: uv
    directory: "/"
    # ADR D3 enforcement (see note above): only ever refresh uv.lock.
    versioning-strategy: lockfile-only
    schedule:
      interval: weekly
      day: monday
    commit-message:
      prefix: deps
    cooldown:
      default-days: 7 # ADR D6.
    open-pull-requests-limit: 10
    labels:
      - dependencies
    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch
        patterns:
          - "*"
