site_name: Standard ASR
site_description: The open standard interface between applications and speech-recognition engines.

theme:
  name: material
  language: en
  features:
    - navigation.instant
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - header.autohide
    - content.code.copy
    - toc.follow
  favicon: assets/branding/icon.png
  font:
    text: Noto Sans
    code: JetBrains Mono
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

plugins:
  - search
  - privacy
  - offline
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          options:
            show_source: false
            show_root_heading: true
            show_root_full_path: false
            show_symbol_type_heading: true
            show_symbol_type_toc: true
            members_order: source
            merge_init_into_class: true
            docstring_style: google
            docstring_section_style: spacy
            show_if_no_docstring: false

extra_css:
  - stylesheets/extra.css

# Exclude internal docs (design notes, research, work docs, legacy) from the
# published site. They stay in the repo as historical records but are not
# user-facing documentation.
exclude_docs: |
  design-notes/
  research/
  work_doc/
  legacy/
  feat_plan/
  misc.md
  compatibility-advisories.md

nav:
  - Home: index.md
  - Getting Started:
      - Quickstart: quickstart.md
      - Installation: installation.md
  - For App Developers:
      - Discover & Use: for_app_dev/discover_and_use.md
      - Streaming: for_app_dev/streaming.md
      - Errors & Diagnostics: for_app_dev/errors.md
  - For Engine Authors:
      - Adapt an Engine: for_asr_dev/adapting_engine.md
      - Plugin Entrypoints: for_asr_dev/plugin_entrypoints.md
  - API Reference:
      - standard_asr: reference/index.md
      - standard_asr.engine: reference/engine.md
      - standard_asr.compliance: reference/compliance.md
      - standard_asr.streaming: reference/streaming.md
      - standard_asr.results: reference/results.md
      - standard_asr.capabilities: reference/capabilities.md
      - standard_asr.exceptions: reference/exceptions.md
      - standard_asr.wire: reference/wire.md
  - Specification:
      - Protocol: spec/specification.md
      - Server API: spec/server.md
      - CLI: spec/cli.md
      - Download Policy: spec/download-policy.md
  - Project:
      - Mission: mission.md
      - Goals: goals.md
      - Roadmap: roadmap.md
